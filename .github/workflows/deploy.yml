name: Deploy AirGuard Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 157.173.116.245 >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no administrator@157.173.116.245 << 'DEPLOY'
            cd /home/administrator/airguard-backend
            git fetch origin && git reset --hard origin/main
            docker compose up -d --build
            sleep 10
            docker exec airguard-backend python manage.py migrate --noinput
            docker exec airguard-backend python manage.py seed_locations
            docker exec airguard-backend python manage.py ensure_admin
            echo "Deploy done at $(date)"
          DEPLOY
