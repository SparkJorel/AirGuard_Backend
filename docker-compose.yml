services:
  airguard-backend:
    build: .
    container_name: airguard-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - .env
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=api.airguard-cm.duckdns.org,airguard-cm.duckdns.org,localhost,127.0.0.1
      - DB_PATH=/app/db/db.sqlite3
    volumes:
      - airguard-db:/app/db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/docs/')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  airguard-db:
